      <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        /* 1. Dynamic Gradient Background */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        /* 2. True Glassmorphism Card */
        #weather-container {
            background: rgba(255, 255, 255, 0.1);
            max-width: 450px;
            width: 90%;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        h2 { margin-top: 0; font-weight: 500; letter-spacing: 1px; }

        /* 3. Modern Search Bar Layout */
        .search-box {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
            outline: none;
            transition: background 0.3s ease;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.7); }
        input:focus { background: rgba(255, 255, 255, 0.3); }

        button {
            background: white;
            color: #764ba2;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        /* 4. Emphasize the Temperature */
        #temp-div p {
            font-size: 72px;
            font-weight: 300;
            margin: 0;
            line-height: 1;
        }

        #weather-info {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .city-name { font-size: 32px; font-weight: 600; margin-bottom: 5px; }
        .description { text-transform: capitalize; color: rgba(255,255,255,0.8); }

        #weather-icon {
            width: 160px;
            height: 160px;
            margin: -10px auto -20px; 
            display: none;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.2)); /* Gives the icon depth */
        }

        /* 5. Sleek Scrollable Hourly Forecast */
        #hourly-forecast {
            margin-top: 30px;
            padding-bottom: 10px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 15px;
            scrollbar-width: thin; /* Firefox */
            scrollbar-color: rgba(255,255,255,0.4) transparent;
        }

        /* Hide scrollbar for Chrome/Safari but keep functionality */
        #hourly-forecast::-webkit-scrollbar { height: 6px; }
        #hourly-forecast::-webkit-scrollbar-track { background: transparent; }
        #hourly-forecast::-webkit-scrollbar-thumb { 
            background: rgba(255,255,255,0.3); 
            border-radius: 10px; 
        }

        .hourly-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hourly-item img {
            width: 45px;
            height: 45px;
            margin: 8px 0;
        }

        .hourly-time { font-size: 14px; color: rgba(255,255,255,0.9); }
        .hourly-temp { font-size: 18px; font-weight: 600; }

    </style>
</head>
<body>
    <div id="weather-container">
        <h2>Weather Forecast</h2>
        
        <div class="search-box">
            <input type="text" id="city" placeholder="Enter city name...">
            <button id="search-btn">Search</button>
        </div>

        <img id="weather-icon" alt="Weather Icon">

        <div id="temp-div"></div>
        <div id="weather-info"></div>
        <div id="hourly-forecast"></div>
    </div>

    <script>
        document.getElementById('search-btn').addEventListener('click', getWeather);
        
        // Allow pressing "Enter" in the input field to trigger the search
        document.getElementById('city').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                getWeather();
            }
        });

        function getWeather() {
            const apiKey = '8a28e613605d28392131f3e8b7e5958f';
            const city = document.getElementById('city').value;

            if (!city) {
                alert('Please enter a city');
                return;
            }

            const currentWeatherUrl = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}`;
            const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}`;

            fetch(currentWeatherUrl)
                .then(response => response.json())
                .then(data => {
                    displayWeather(data);
                })
                .catch(error => {
                    console.error('Error fetching current weather data:', error);
                    alert('Error fetching current weather data. Please try again.');
                });

            fetch(forecastUrl)
                .then(response => response.json())
                .then(data => {
                    displayHourlyForecast(data.list);
                })
                .catch(error => {
                    console.error('Error fetching hourly forecast data:', error);
                    alert('Error fetching hourly forecast data. Please try again.');
                });
        }

        function displayWeather(data) {
            const tempDivInfo = document.getElementById('temp-div');
            const weatherInfoDiv = document.getElementById('weather-info');
            const weatherIcon = document.getElementById('weather-icon');
            const hourlyForecastDiv = document.getElementById('hourly-forecast');

            weatherInfoDiv.innerHTML = '';
            hourlyForecastDiv.innerHTML = '';
            tempDivInfo.innerHTML = '';

            if (data.cod === '404') {
                weatherInfoDiv.innerHTML = `<p>${data.message}</p>`;
            } else {
                const cityName = data.name;
                const temperature = Math.round(data.main.temp - 273.15); 
                const description = data.weather[0].description;
                const iconCode = data.weather[0].icon;
                const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;

                const temperatureHTML = `<p>${temperature}°C</p>`;

                // Added dedicated classes for better styling control
                const weatherHtml = `
                    <div class="city-name">${cityName}</div>
                    <div class="description">${description}</div>
                `;

                tempDivInfo.innerHTML = temperatureHTML;
                weatherInfoDiv.innerHTML = weatherHtml;
                weatherIcon.src = iconUrl;
                weatherIcon.alt = description;

                showImage();
            }
        }

        function displayHourlyForecast(hourlyData) {
            const hourlyForecastDiv = document.getElementById('hourly-forecast');
            const next24Hours = hourlyData.slice(0, 8); 

            next24Hours.forEach(item => {
                const dateTime = new Date(item.dt * 1000); 
                
                // Format hour to 12-hour AM/PM format instead of military time
                let hour = dateTime.getHours();
                const ampm = hour >= 12 ? 'PM' : 'AM';
                hour = hour % 12;
                hour = hour ? hour : 12; 
                const timeString = `${hour} ${ampm}`;

                const temperature = Math.round(item.main.temp - 273.15); 
                const iconCode = item.weather[0].icon;
                const iconUrl = `https://openweathermap.org/img/wn/${iconCode}.png`;

                const hourlyItemHtml = `
                    <div class="hourly-item">
                        <span class="hourly-time">${timeString}</span>
                        <img src="${iconUrl}" alt="Hourly Weather Icon">
                        <span class="hourly-temp">${temperature}°</span>
                    </div>
                `;

                hourlyForecastDiv.innerHTML += hourlyItemHtml;
            });
        }

        function showImage() {
            const weatherIcon = document.getElementById('weather-icon');
            weatherIcon.style.display = 'block'; 
        }
    </script>
</body>
</html>
